name: Backend Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      MYSQL_DATABASE: product_review_ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start services
        run: make up

      - name: Prepare test database
        run: |
          docker compose exec -T -e DATABASE_URL="mysql://root:${MYSQL_ROOT_PASSWORD:-rootpassword}@mysql:3306/${MYSQL_DATABASE:-product_review}?serverVersion=8.0.32&charset=utf8mb4" app php bin/console doctrine:database:create --if-not-exists --env=test
          docker compose exec -T -e DATABASE_URL="mysql://root:${MYSQL_ROOT_PASSWORD:-rootpassword}@mysql:3306/${MYSQL_DATABASE:-product_review}?serverVersion=8.0.32&charset=utf8mb4" app php bin/console doctrine:migrations:migrate --no-interaction --env=test

      - name: Run tests
        run: make test

      - name: Show logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Stop services
        if: always()
        run: make down