services:
  mysql:
    image: mysql:8.0
    container_name: product_review_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-product_review}
      MYSQL_USER: ${MYSQL_USER:-app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-apppassword}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: product_review_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: product_review_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./backend
      dockerfile: docker/php/Dockerfile
    container_name: product_review_app
    restart: unless-stopped
    working_dir: /var/www/app
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/app
    environment:
      APP_ENV: ${APP_ENV:-dev}
      PORT: "80"
      DATABASE_URL: "mysql://${MYSQL_USER:-app}:${MYSQL_PASSWORD:-apppassword}@mysql:3306/${MYSQL_DATABASE:-product_review}?serverVersion=8.0.32&charset=utf8mb4"
      REDIS_URL: "redis://redis:6379"
      MESSENGER_TRANSPORT_DSN: "amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/%2f/messages"
      JWT_SECRET_KEY: "%kernel.project_dir%/config/jwt/private.pem"
      JWT_PUBLIC_KEY: "%kernel.project_dir%/config/jwt/public.pem"
      JWT_PASSPHRASE: ${JWT_PASSPHRASE:-your_passphrase}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app_network

  consumer:
    build:
      context: ./backend
      dockerfile: docker/php/Dockerfile
    container_name: product_review_consumer
    restart: unless-stopped
    working_dir: /var/www/app
    command: php bin/console messenger:consume async --limit=100 --memory-limit=128M -vv
    volumes:
      - ./backend:/var/www/app
    environment:
      APP_ENV: ${APP_ENV:-dev}
      DATABASE_URL: "mysql://${MYSQL_USER:-app}:${MYSQL_PASSWORD:-apppassword}@mysql:3306/${MYSQL_DATABASE:-product_review}?serverVersion=8.0.32&charset=utf8mb4"
      REDIS_URL: "redis://redis:6379"
      MESSENGER_TRANSPORT_DSN: "amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/%2f/messages"
      JWT_SECRET_KEY: "%kernel.project_dir%/config/jwt/private.pem"
      JWT_PUBLIC_KEY: "%kernel.project_dir%/config/jwt/public.pem"
      JWT_PASSPHRASE: ${JWT_PASSPHRASE:-your_passphrase}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app_network

  frontend:
    image: node:20-alpine
    container_name: product_review_frontend
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/app
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    ports:
      - "5173:5173"
    networks:
      - app_network

volumes:
  mysql_data:

networks:
  app_network:
    driver: bridge
